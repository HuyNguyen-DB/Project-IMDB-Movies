<div class="user-menu">
    <button type="button" class="user-trigger" aria-label="Tài khoản">
        <span class="avatar">{{ user.get_full_name|default:user.username|slice:":1"|upper }}</span>
        <span class="user-info">
            <strong>{{ user.get_full_name|default:user.username }}</strong>
            <span>{{ user.email|default:"Tài khoản người dùng" }}</span>
        </span>
        <span class="dropdown-arrow">▾</span>
    </button>

    <div class="dropdown-menu">
        <div class="dropdown-header">
            <strong>{{ user.get_full_name|default:user.username }}</strong>
            <p>{{ user.email|default:"Chưa có email liên hệ" }}</p>
        </div>

        <a href="{% url 'profile_detail' %}" class="dropdown-item">👤 Thông tin cá nhân</a>
        <a href="{% url 'user_home' %}" class="dropdown-item">📜 Lịch sử đặt phim</a>
        <a href="{% url 'password_change' %}" class="dropdown-item">🔐 Đổi mật khẩu</a>

        <form method="POST" action="{% url 'logout' %}" class="dropdown-form">
            {% csrf_token %}
            <button type="submit">🚪 Đăng xuất</button>
        </form>
    </div>
</div>
