{% block extra_js %}

<script>
function formatReply(text){
    if(!text){
        return "";
    }

    // Chống trường hợp bot còn trả link cũ
    text = text.replace(
        /\/select_movie\//g,
        "/select-movie/"
    );

    // Link phim dạng tương đối: /select-movie/tt123/
    text = text.replace(
        /\/select-movie\/([a-zA-Z0-9]+)\//g,
        '<a href="/select-movie/$1/" class="chat-link">🎬 Đặt phim</a>'
    );

    // Link phòng dạng tương đối: /room/GROUP_01/
    text = text.replace(
        /\/room\/([a-zA-Z0-9_]+)\//g,
        '<a href="/room/$1/" class="chat-link">🍿 Xem phòng</a>'
    );

    // Link đầy đủ nếu có http/https
    text = text.replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" class="chat-link">$1</a>'
    );

    text = text.replace(/\n/g, "<br>");

    return text;
}

async function sendMessage(){
    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if(!message){
        return;
    }

    const chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `
        <div class="user-message">
            <b>Bạn:</b> ${message}
        </div>
    `;

    input.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;

    try{
        const response = await fetch(
            "/chatbot/",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/x-www-form-urlencoded"
                },
                body:new URLSearchParams({
                    message:message
                })
            }
        );

        const data = await response.json();

        chatbox.innerHTML += `
            <div class="bot-message">
                <b>Bot:</b><br>
                ${formatReply(data.reply)}
            </div>
        `;

        chatbox.scrollTop = chatbox.scrollHeight;

    }catch(error){
        chatbox.innerHTML += `
            <div class="bot-message">
                <b>Bot:</b><br>
                Có lỗi xảy ra khi kết nối chatbot.
            </div>
        `;

        chatbox.scrollTop = chatbox.scrollHeight;
    }
}

document
    .getElementById("userInput")
    ?.addEventListener("keydown", function(event){
        if(event.key === "Enter"){
            sendMessage();
        }
    });
</script>

{% endblock %}
