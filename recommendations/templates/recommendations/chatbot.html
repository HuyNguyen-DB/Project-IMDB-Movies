{% extends "recommendations/base.html" %}
{% block title %}Chatbot{% endblock %}
{% block content %}
<main class="page-narrow">
    <section class="card">
        <h1 class="page-title">Chatbot hỗ trợ</h1>
        <p class="page-subtitle">Nhập câu hỏi của bạn để nhận phản hồi từ bot.</p>
        <div id="chatbox" class="card section" style="height:360px; overflow-y:auto; padding:18px;"></div>
        <div class="form-row section" style="grid-template-columns:1fr auto;"><input type="text" id="userInput" placeholder="Nhập câu hỏi..."><button type="button" onclick="sendMessage()" class="btn btn-primary">Gửi</button></div>
    </section>
</main>
{% endblock %}
{% block extra_js %}
<script>
async function sendMessage(){const input=document.getElementById("userInput");const message=input.value.trim();if(!message){return;}const response=await fetch("/chatbot/",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({message:message})});const data=await response.json();const chatbox=document.getElementById("chatbox");chatbox.innerHTML+="<p><b>Bạn:</b> "+message+"</p>";chatbox.innerHTML+="<p><b>Bot:</b> "+data.reply+"</p>";input.value="";chatbox.scrollTop=chatbox.scrollHeight;}
</script>
{% endblock %}
