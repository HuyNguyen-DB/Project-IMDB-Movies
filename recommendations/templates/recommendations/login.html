<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Nhập</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:#e5e7eb;
    background:linear-gradient(180deg,#020617,#0f172a,#020617);
}

/* NAVBAR */

.navbar{
    position:sticky;
    top:0;
    background:rgba(2,6,23,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-container{
    max-width:1200px;
    margin:auto;
    padding:14px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:bold;
    font-size:18px;
}

/* MAIN */

.container{
    max-width:420px;
    margin:80px auto;
    padding:20px;
}

/* CARD */

.form-card{
    background:#111827;
    padding:35px;
    border-radius:18px;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

/* TITLE */

.form-title{
    text-align:center;
    font-size:28px;
    margin-bottom:25px;
    color:#22c55e;
}

/* INPUT */

.form-card input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    font-size:15px;
}

/* ERROR */

.errorlist{
    color:#f87171;
    list-style:none;
    padding:0;
    margin-bottom:10px;
}

/* BUTTON */

.submit-btn{
    width:100%;
    padding:14px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.submit-btn:hover{
    background:#16a34a;
}

/* LINKS */

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#22c55e;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

/* BACK */

.back-btn{
    margin-top:15px;
}

.back-btn button{
    width:100%;
    padding:12px;
    background:#374151;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.back-btn button:hover{
    background:#4b5563;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-container">
        <div class="logo">🎬 Movie Webapp</div>

        <a href="{% url 'home' %}">
            <button style="background:#374151;color:white;border:none;padding:8px 14px;border-radius:8px;">
                Trang chủ
            </button>
        </a>
    </div>
</div>

<div class="container">

<div class="form-card">

<div class="form-title">
🔐 Đăng Nhập
</div>

<form method="POST">
    {% csrf_token %}

    {{ form.non_field_errors }}

    {{ form.username.errors }}
    {{ form.username }}

    {{ form.password.errors }}
    {{ form.password }}

    <button type="submit" class="submit-btn">
        Đăng Nhập
    </button>
</form>

<div class="links">
    Chưa có tài khoản?
    <a href="{% url 'signup' %}">Đăng ký</a>
</div>

<div class="back-btn">
    <a href="{% url 'home' %}">
        <button>← Quay lại trang chủ</button>
    </a>
</div>

</div>

</div>

</body>
</html>
