<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt phim</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    color:white;
    background:linear-gradient(180deg,#020617,#0f172a,#020617);
}

/* Container */

.container{
    max-width:1200px;
    margin:auto;
    padding:60px 40px;
}

/* Card phim */

.movie-card{
    display:flex;
    gap:60px;
    background:#111827;
    padding:50px;
    border-radius:16px;
    box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

/* Poster */

.poster img{
    width:320px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

/* Info */

.info{
    flex:1;
}

/* Title */

.movie-title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:20px;
    color:#f472b6;
}

/* Info text */

.info-item{
    margin-bottom:20px;
    font-size:20px;
}

.info-item span{
    color:#9ca3af;
}

/* Form */

.form-group{
    margin-top:25px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#9ca3af;
    font-size:18px;
}

input[type="datetime-local"]{
    width:260px;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

/* Button */

button{
    margin-top:30px;
    padding:14px 32px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* Buttons dưới */

.actions{
    margin-top:50px;
    text-align:center;
}

.actions a{
    text-decoration:none;
}

.actions button{
    margin:10px;
    padding:12px 22px;
    background:#374151;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.actions button:hover{
    background:#4b5563;
}

</style>
</head>

<body>

<div class="container">

<div class="movie-card">

<!-- Poster -->
<div class="poster">

{% if poster %}
<img src="{{ poster }}" alt="{{ title }}">
{% endif %}

</div>

<!-- Info -->
<div class="info">

<div class="movie-title">
{{ title }}
</div>

<div class="info-item">
<span>Thể loại:</span> {{ genre }}
</div>

<form method="POST">

{% csrf_token %}

<!-- Hidden fields giữ nguyên logic -->
<input type="hidden" name="movie_title" value="{{ title }}">
<input type="hidden" name="movie_genre" value="{{ genre }}">

<div class="form-group">

<label>Thời gian xem</label>

{{ form.booking_date }}

</div>

<button type="submit">
🎬 Đặt phim
</button>

</form>

</div>

</div>

<div class="actions">

<a href="{% url 'user_home' %}">
<button>📜 Xem lịch sử đặt phim</button>
</a>

<a href="{% url 'home' %}">
<button>🏠 Trang chủ</button>
</a>

</div>

</div>

</body>
</html>
